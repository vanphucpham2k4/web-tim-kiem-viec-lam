<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connection - Unicareer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #2545B8;
            margin-bottom: 20px;
        }
        .success {
            color: #10b981;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .info {
            background: #f0f9ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #2545B8;
        }
        .info p {
            margin: 10px 0;
            text-align: left;
        }
        .links {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #2545B8;
        }
        .btn-secondary:hover {
            background: #1a3599;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success">✅</div>
        <h1>Kết Nối Thành Công!</h1>
        <p>Static files đang hoạt động bình thường.</p>
        
        <div class="info">
            <p><strong>🌐 Server:</strong> <span id="server">Loading...</span></p>
            <p><strong>⏰ Thời gian:</strong> <span id="time">Loading...</span></p>
            <p><strong>🖥️ User Agent:</strong> <span id="ua">Loading...</span></p>
        </div>

        <div class="links">
            <h3>Các công cụ khả dụng:</h3>
            <a href="/TestApiDirectly.html" class="btn">
                🔍 Test API Connection
            </a>
            <a href="/TestBlogDatabase.html" class="btn btn-secondary">
                📊 Check Blog Database
            </a>
            <a href="/Admin/Admin/Blog" class="btn btn-secondary">
                📝 Admin Blog Page
            </a>
        </div>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb;">
            <p style="color: #6b7280; font-size: 14px;">
                <strong>Lưu ý:</strong> TestBlogDatabase.html và Admin Blog Page cần đăng nhập Admin
            </p>
        </div>
    </div>

    <script>
        document.getElementById('server').textContent = window.location.origin;
        document.getElementById('time').textContent = new Date().toLocaleString('vi-VN');
        document.getElementById('ua').textContent = navigator.userAgent.split(' ').slice(0, 3).join(' ') + '...';
    </script>
</body>
</html>
